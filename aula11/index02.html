<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 11 CSS</title>
    <link rel="stylesheet" href="./css/style02.css" />
  </head>
  <body>
    <!-- Grid Layout -->
    <h2>Exemplos de alinhamento em itens do Grid Layout</h2>

    <h3>justify-self: left</h3>
    <h3>justify-self: right</h3>

    <div class="ex1">
      <div class="ex1-item1">1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div class="ex1-item6">6</div>
    </div>

    <hr>

    <h3>align-self: start</h3>
    <h3>align-self: end</h3>

    <div class="ex2">
      <div class="ex2-item1">1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div class="ex2-item6">6</div>
    </div>
  </body>
</html>
